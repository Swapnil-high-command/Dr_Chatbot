<!DOCTYPE html>
<html>
<head>
<title>Dr.MEDI-BOT UI</title>
 <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

 
</head>

<body>

<div id="parent">

 
<div id="menu">
<ul>
<li><img height="45" width="55" src="{{ url_for('static', filename='ai.png') }}" class="logo"></li>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Login</a></li>
<li><a href="#">More</a></li>
</ul>
</div>

 
<div id="content">
    <div class="card">📊 Health Stats</div>
    <div class="card">🧠 AI Analysis</div>
</div>

 
<div id="footer">
    <div class="chatbox">

        <h3>🤖 MEDI-BOT</h3>

        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Ask something...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>
</div>

</div>

<script>

function sendMessage(){
    const input = document.getElementById('input');
    const chat = document.getElementById('chat');

    const message = input.value.trim();
    if(!message) return;

    chat.innerHTML += `<div class="user">You: ${message}</div>`;
    input.value = '';

    fetch('/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:message})
    })
    .then(res => res.json())
    .then(data => {
        chat.innerHTML += `<div class="bot">Bot: ${data.response}</div>`;
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(() => {
        chat.innerHTML += `<div class="bot">Bot: Server error</div>`;
    });
}

</script>

</body>
</html>
